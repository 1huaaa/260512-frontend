<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/hero.css">
    <link rel="stylesheet" href="./css/info.css">
    <link rel="stylesheet" href="./css/quote.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <h1 class="title">Header Logo</h1>
                <ul class="nav-link-group">
                    <li><a href="#" class="nav-link">intro</a></li>
                    <li><a href="#" class="nav-link">contact</a></li>
                    <li><a href="#" class="nav-link">more</a></li>
                </ul>
            </nav>
        </div>
    </header>

<main>
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h2 class="hero-title">This website is awesome</h2>
                <p class="hero-text">This website has some subtext...</p>
                <a href="#" class="hero-link-btn">Sign up</a>
            </div>
            <figure class="hero-media">
                <img src="./img/images (1).jpg" alt="hero-img" class="hero-image">
            </figure>
        </div>
    </section>

    <section class="info">
        <div class="container">
            <h2 class="info-title">Some random information.</h2>
            <div class="info-list">
                <figure class="info-card">
                    <img src="./img/images (1).jpg" alt="dog1">
                    <figcaption>this is some subtext under an illustration or image</figcaption>
                </figure>
                <figure class="info-card">
                    <img src="./img/images (1).jpg" alt="dog2">
                    <figcaption>this is some subtext under an illustration or image</figcaption>
                </figure>
                <figure class="info-card">
                    <img src="./img/images (1).jpg" alt="dog3">
                    <figcaption>this is some subtext under an illustration or image</figcaption>
                </figure>
                <figure class="info-card">
                    <img src="./img/images (1).jpg" alt="dog4">
                    <figcaption>this is some subtext under an illustration or image</figcaption>
                </figure>
            </div>
        </div>
    </section>

    <section class="quote">
        <div class="container">
            <figure class="quote-block">
                <blockquote class="quote-text">This is an inspiring quote, or a testimonial from a customer.</blockquote>
                <figcaption class="quote-author">
                    <cite>— Thor, God of Thunder</cite>
                </figcaption>
            </figure>
        </div>
    </section>

    <section class="cta">
        <div class="container">
            <div class="cta-text">
                <h3 class="cta-title">Call to action! It's time!</h3>
                <p class="cta-text">Sign up for our product by clicking that button right over there!</p>
            </div>
            <a href="#" class="cta-btn">Sign up</a>
        </div>
    </section>
</main>

    <footer>
        <div class="container">
            <p>Copyright © The Odin Project 2021</p>
        </div>
    </footer>
</body>
</html>
